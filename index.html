<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <div class="topbar">
        <h1>Mini-Sandbox</h1>

        <div class="controls">
            <button class="tool active" data-type="sand">Sand</button>
            <button class="tool" data-type="water">Water</button>
            <button class="tool" data-type="stone">Stone</button>
            <button class="tool" data-type="eraser">Eraser</button>
            <button class="tool" data-type="fire">Fire</button>
            <label>
                Size:
                <input type="range" id="brushSize" min="1" max="6" value="2"/>
            </label>
            <button id="clearBtn">Reset</button>
        </div>
    </div>

    <div class="game-wrap">
        <canvas id="canvas"></canvas>
    </div>

    <script src="script.js"></script>
</body>
</html>
